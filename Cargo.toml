[package]
name = "push-to-talk"
version = "0.1.0"
edition = "2024"
description = "Push-to-talk voice input for CLI using Whisper"

[dependencies]
anyhow = "1"
arboard = "3"
clap = { version = "4", features = ["derive"] }
cpal = "0.15"
hound = "3"
# Base whisper-rs: log_backend is universal. GPU features selected per-platform below.
whisper-rs = { version = "0.15", features = ["log_backend"] }
rdev = "0.5"
enigo = "0.2"
log = "0.4"
tracing = "0.1"
tracing-log = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
chrono = "0.4"
reqwest = { version = "0.11", features = ["blocking", "rustls-tls"], default-features = false }
indicatif = "0.17"

# Windows: CUDA GPU, tray icon (Shell_NotifyIcon)
[target.'cfg(windows)'.dependencies]
whisper-rs = { version = "0.15", features = ["cuda", "log_backend"] }
windows = { version = "0.56", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_UI_WindowsAndMessaging",
    "Win32_UI_Shell",
] }

# macOS: Metal + CoreML GPU, no tray dependency needed
[target.'cfg(target_os = "macos")'.dependencies]
whisper-rs = { version = "0.15", features = ["metal", "coreml", "log_backend"] }
