[package]
name = "push-to-talk"
version = "0.1.0"
edition = "2024"
description = "Push-to-talk voice input for CLI using Whisper"

[dependencies]
anyhow = "1"
arboard = "3"
cpal = "0.15"
hound = "3"
whisper-rs = { version = "0.15", features = ["cuda", "log_backend"] }
rdev = "0.5"
enigo = "0.2"
log = "0.4"                       # whisper-rs log_backend writes here
tracing = "0.1"
tracing-log = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
chrono = "0.4"
