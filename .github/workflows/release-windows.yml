name: Release — Windows

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-cpu:
    name: Build Windows (CPU)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build release (CPU)
        run: cargo tauri build -- --no-default-features

      - name: Rename CPU installer
        run: |
          $f = Get-ChildItem target/release/bundle/nsis/*.exe | Select-Object -First 1
          $new = $f.DirectoryName + '\' + [IO.Path]::GetFileNameWithoutExtension($f.Name) + '-CPU' + $f.Extension
          Rename-Item $f.FullName $new

      - name: Upload NSIS installer (CPU)
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-cuda:
    name: Build Windows (CUDA)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Setup CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.2.0'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build release (CUDA)
        run: cargo tauri build -- --features cuda

      - name: Rename CUDA installer
        run: |
          $f = Get-ChildItem target/release/bundle/nsis/*.exe | Select-Object -First 1
          $new = $f.DirectoryName + '\' + [IO.Path]::GetFileNameWithoutExtension($f.Name) + '-CUDA' + $f.Extension
          Rename-Item $f.FullName $new

      - name: Upload NSIS installer (CUDA)
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
